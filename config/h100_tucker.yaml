# Strategy 3: Tucker Decomposition with Rank Estimation for H100 80GB
model:
  name: google/gemma-3-27b-it
  source: hf
  device: cuda
  trust_remote_code: true

auth:
  hf_token_env: HF_TOKEN

runtime:
  workspace: logs/h100_tucker
  compressed_subdir: compressed

analysis:
  type: activation_metrics
  metrics:
    names: [tucker_rank_est, frobenius_norm, spectral_norm]
  selection:
    include_names: ["mlp", "self_attn"]
  aggregation:
    reductions: ["mean", "median"]
  compute:
    move_to_cpu: true
  output:
    report_dir: logs/h100_tucker/analysis
    stem: tucker_analysis
    timestamp: true
    save_json: true

factorization:
  objects:
    - "model.layers[*].self_attn.q_proj"
    - "model.layers[*].self_attn.k_proj"
    - "model.layers[*].mlp.gate_proj"
  func_name: "tucker"
  tucker_ranks: [64, 64]
  device: cuda
  backend: pytorch

evaluation:
  type: lm_eval
  tasks: [arc_easy]
  batch_size: 1
  device: cuda
